name: Lint Markdown

on:
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - ".markdownlint-cli2.jsonc"
      - "package.json"
      - "package-lock.json"
  pull_request:
    paths:
      - "**/*.md"
      - ".markdownlint-cli2.jsonc"
      - "package.json"
      - "package-lock.json"

permissions:
  contents: read

jobs:
  lint:
    name: markdownlint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - run: npm ci

      - run: npm run lint:md
